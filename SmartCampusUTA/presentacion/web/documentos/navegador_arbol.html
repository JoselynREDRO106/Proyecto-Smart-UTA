<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Navegador de arbol - SmartCampusUTA</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="../assets/css/styles.css"></head><body><div class="app-shell"><div data-navbar></div><main class="container py-4"><div class="page-header"><h1>Navegador de arbol documental</h1></div><section class="content-panel"><div data-tree></div></section></main><div data-footer></div></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="../assets/js/config.js"></script><script src="../assets/js/utils.js"></script><script type="module" src="../assets/js/api.js"></script><script type="module" src="../assets/js/auth.js"></script><script src="../assets/js/componentes/navbar.js"></script><script src="../assets/js/componentes/footer.js"></script><script>function tree(n){return `<div class="tree-node mb-2"><strong>${n.categoria.nombre}</strong>${n.hijos?.length?`<div class="tree-children mt-2">${n.hijos.map(tree).join("")}</div>`:""}</div>`}document.addEventListener("DOMContentLoaded",async()=>{document.querySelector("[data-tree]").innerHTML=tree(await SmartCampusAPI.parseJson(await SmartCampusAPI.obtenerArbolDocumentos()))});</script></body></html>
