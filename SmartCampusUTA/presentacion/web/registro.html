<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - SmartCampusUTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="auth-page">
  <main class="container">
    <section class="auth-card">
      <a class="d-flex align-items-center gap-2 mb-4" href="index.html"><span class="brand-mark">SC</span><strong>SmartCampusUTA</strong></a>
      <h1 class="h3">Crear cuenta</h1>
      <p class="text-muted">El administrador se crea desde backend. Aqui se registran estudiantes o empleados autorizados.</p>
      <div id="register-alert"></div>
      <form data-register-form>
        <div class="mb-3"><label class="form-label">Nombre completo</label><input class="form-control" name="nombre" required></div>
        <div class="mb-3"><label class="form-label">Correo electronico</label><input class="form-control" name="email" type="email" required></div>
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Telefono</label><input class="form-control" name="telefono"></div>
          <div class="col-md-6"><label class="form-label">Carrera</label><input class="form-control" name="carrera" placeholder="Sistemas"></div>
        </div>
        <div class="my-3"><label class="form-label">Rol solicitado</label><select class="form-select" name="rolId"><option value="3">Estudiante</option><option value="2">Empleado autorizado</option></select></div>
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Contrasena</label><input class="form-control" name="password" type="password" required></div>
          <div class="col-md-6"><label class="form-label">Confirmar contrasena</label><input class="form-control" name="confirmar" type="password" required></div>
        </div>
        <button class="btn btn-primary w-100 mt-4" type="submit">Registrarme</button>
      </form>
      <p class="mt-3 text-center"><a href="login.html">Ya tengo cuenta</a></p>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/config.js"></script><script src="assets/js/utils.js"></script><script src="assets/js/api.js"></script><script src="assets/js/auth.js"></script>
</body>
</html>
