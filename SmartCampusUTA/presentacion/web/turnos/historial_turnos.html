<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Historial de turnos - SmartCampusUTA</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="../assets/css/styles.css"></head><body><div class="app-shell"><div data-navbar></div><main class="container py-4"><div class="page-header"><h1>Historial de turnos</h1></div><section class="table-wrap"><table class="table"><thead><tr><th>Turno</th><th>Tramite</th><th>Hora</th><th>Estado</th></tr></thead><tbody data-turnos></tbody></table></section></main><div data-footer></div></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="../assets/js/config.js"></script><script src="../assets/js/utils.js"></script><script type="module" src="../assets/js/api.js"></script><script type="module" src="../assets/js/auth.js"></script><script src="../assets/js/componentes/navbar.js"></script><script src="../assets/js/componentes/footer.js"></script><script>document.addEventListener("DOMContentLoaded",async()=>{const data=await SmartCampusAPI.parseJson(await SmartCampusAPI.obtenerTurnosUsuario());document.querySelector("[data-turnos]").innerHTML=data.map(t=>`<tr><td>${t.numero}</td><td>${t.tramite}</td><td>${t.hora}</td><td>${SmartCampusUtils.stateBadge(t.estado)}</td></tr>`).join("")});</script></body></html>
