<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesion - SmartCampusUTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="auth-page">
  <main class="container">
    <section class="auth-card">
      <a class="d-flex align-items-center gap-2 mb-4" href="index.html"><span class="brand-mark">SC</span><strong>SmartCampusUTA</strong></a>
      <h1 class="h3">Iniciar sesion</h1>
      <p class="text-muted">Acceso para administradores, empleados y estudiantes FISEI.</p>
      <div id="login-alert"></div>
      <form data-login-form>
        <div class="mb-3"><label class="form-label" for="email">Correo electronico</label><input class="form-control" id="email" name="email" type="email" required placeholder="usuario@uta.edu.ec"></div>
        <div class="mb-3"><label class="form-label" for="password">Contrasena</label><input class="form-control" id="password" name="password" type="password" required></div>
        <button class="btn btn-primary w-100" type="submit">Iniciar sesion</button>
      </form>
      <p class="mt-3 mb-1 text-center"><a href="registro.html">¿No tienes cuenta? Regístrate aquí</a></p>
      <p class="text-center mb-0"><a href="#">¿Olvidaste tu contrasena?</a></p>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/config.js"></script><script src="assets/js/utils.js"></script><script src="assets/js/api.js"></script><script src="assets/js/auth.js"></script>
</body>
</html>
