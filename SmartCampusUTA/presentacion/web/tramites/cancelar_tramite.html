<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cancelar turno - SmartCampusUTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <div data-navbar></div>
    <main class="container py-4">
      <div class="page-header">
        <h1>Cancelar turno</h1>
        <p class="text-muted">Disponible solo si el turno todavia no fue atendido.</p>
      </div>
      <section class="content-panel">
        <form id="cancel-form">
          <label class="form-label" for="turnoId">ID del turno</label>
          <input class="form-control mb-3" id="turnoId" name="turnoId" type="number" min="1" required>
          <button class="btn btn-danger">Confirmar cancelacion</button>
          <a class="btn btn-outline-secondary" href="../roles/estudiante/mis_turnos.html">Volver</a>
        </form>
        <div id="cancel-alert" class="mt-3"></div>
      </section>
    </main>
    <div data-footer></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script type="module" src="../assets/js/api.js"></script>
  <script type="module" src="../assets/js/auth.js"></script>
  <script src="../assets/js/componentes/navbar.js"></script>
  <script src="../assets/js/componentes/footer.js"></script>
  <script>
    document.querySelector("#cancel-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        await SmartCampusAPI.parseJson(await SmartCampusAPI.cancelarTurno(new FormData(event.target).get("turnoId")));
        SmartCampusUtils.showAlert("#cancel-alert", "Turno cancelado correctamente.", "success");
      } catch (error) {
        SmartCampusUtils.showAlert("#cancel-alert", error.message, "danger");
      }
    });
  </script>
</body>
</html>
