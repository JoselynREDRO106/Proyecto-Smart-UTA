<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Detalle de tramite - SmartCampusUTA</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="../assets/css/styles.css"></head><body><div class="app-shell"><div data-navbar></div><main class="container py-4"><div class="page-header"><h1>Detalle de tramite</h1><p class="text-muted">Vista por ID desde parametro de URL.</p></div><section class="content-panel"><h2 class="h5" id="titulo">Tramite seleccionado</h2><p class="mock-note">Esta vista consume /api/tramites/{id} cuando el backend exponga el endpoint. Actualmente usa datos simulados.</p><div data-pila></div></section></main><div data-footer></div></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="../assets/js/config.js"></script><script src="../assets/js/utils.js"></script><script type="module" src="../assets/js/api.js"></script><script type="module" src="../assets/js/auth.js"></script><script src="../assets/js/componentes/navbar.js"></script><script src="../assets/js/componentes/footer.js"></script><script src="../assets/js/estructuras/pila.js"></script><script>document.addEventListener("DOMContentLoaded",async()=>{document.querySelector("#titulo").textContent=`Tramite #${SmartCampusUtils.getQueryParam("id")||"101"}`;SmartCampusPila.render("[data-pila]",await SmartCampusAPI.parseJson(await SmartCampusAPI.obtenerHistorialTramites()))});</script></body></html>
