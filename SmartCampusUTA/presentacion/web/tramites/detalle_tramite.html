<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de tramite - SmartCampusUTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <div data-navbar></div>
    <main class="container py-4">
      <div class="page-header">
        <h1>Detalle de tramite</h1>
        <p class="text-muted">Historial de cambios del tramite seleccionado.</p>
      </div>
      <section class="content-panel">
        <h2 class="h5" id="titulo">Tramite seleccionado</h2>
        <div data-pila></div>
      </section>
    </main>
    <div data-footer></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script type="module" src="../assets/js/api.js"></script>
  <script type="module" src="../assets/js/auth.js"></script>
  <script src="../assets/js/componentes/navbar.js"></script>
  <script src="../assets/js/componentes/footer.js"></script>
  <script src="../assets/js/estructuras/pila.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const tramiteId = SmartCampusUtils.getQueryParam("id") || SmartCampusUtils.getQueryParam("tramiteId");
      document.querySelector("#titulo").textContent = `Tramite #${tramiteId || "-"}`;
      const target = document.querySelector("[data-pila]");
      if (!tramiteId) {
        target.innerHTML = `<p class="text-muted mb-0">No se recibio un ID de tramite.</p>`;
        return;
      }
      try {
        const historial = await SmartCampusAPI.parseJson(await SmartCampusAPI.obtenerHistorialTramites(tramiteId));
        SmartCampusPila.render(target, historial);
      } catch (error) {
        SmartCampusUtils.showAlert(target, error.message, "danger");
      }
    });
  </script>
</body>
</html>
