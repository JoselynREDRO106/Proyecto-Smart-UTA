<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion de tramites - Administrador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/admin.css">
</head>
<body class="admin-accent">
  <div class="app-shell">
    <div data-navbar></div>
    <main class="container py-4">
      <div class="page-header">
        <h1>Gestion de tramites</h1>
        <p class="text-muted">Consulta global de solicitudes, responsables y estados.</p>
      </div>
      <section class="table-wrap">
        <table class="table">
          <thead>
            <tr><th>Fecha</th><th>Tipo</th><th>Responsable</th><th>Estado</th><th></th></tr>
          </thead>
          <tbody data-tramites></tbody>
        </table>
      </section>
    </main>
    <div data-footer></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script type="module" src="../../assets/js/api.js"></script>
  <script type="module" src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/componentes/navbar.js"></script>
  <script src="../../assets/js/componentes/footer.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const target = document.querySelector("[data-tramites]");
      try {
        const data = await SmartCampusAPI.parseJson(await SmartCampusAPI.obtenerHistorialTramites());
        target.innerHTML = data.length ? data.map((t) => `
          <tr>
            <td>${(t.fechaSolicitud || "").toString().replace("T", " ")}</td>
            <td>Tipo ${t.tipoTramiteId || "-"}</td>
            <td>${t.empleadoId ? `Empleado ${t.empleadoId}` : "Sin asignar"}</td>
            <td>${SmartCampusUtils.stateBadge(t.estado || "pendiente")}</td>
            <td><a class="btn btn-sm btn-outline-primary" href="../../tramites/detalle_tramite.html?id=${t.id}">Detalle</a></td>
          </tr>
        `).join("") : `<tr><td colspan="5" class="text-muted">No hay tramites registrados.</td></tr>`;
      } catch (error) {
        target.innerHTML = `<tr><td colspan="5" class="text-danger">${error.message}</td></tr>`;
      }
    });
  </script>
</body>
</html>
