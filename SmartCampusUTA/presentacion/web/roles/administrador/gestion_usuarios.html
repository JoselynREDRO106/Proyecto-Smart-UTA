<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Gestion de usuarios - Administrador</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="../../assets/css/styles.css"><link rel="stylesheet" href="../../assets/css/admin.css"></head><body class="admin-accent"><div class="app-shell"><div data-navbar></div><main class="container py-4"><div class="page-header"><h1>Gestion de usuarios</h1><p class="text-muted">CRUD conectado a /api/auth/usuarios.</p></div><div class="table-wrap"><div class="d-flex flex-wrap gap-2 justify-content-between mb-3"><input class="form-control w-auto" placeholder="Buscar usuario"><button class="btn btn-warning">Nuevo usuario</button></div><table class="table align-middle"><thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Acciones</th></tr></thead><tbody id="usuarios-body"></tbody></table></div></main><div data-footer></div></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="../../assets/js/config.js"></script><script src="../../assets/js/utils.js"></script><script type="module" src="../../assets/js/api.js"></script><script type="module" src="../../assets/js/auth.js"></script><script src="../../assets/js/componentes/navbar.js"></script><script src="../../assets/js/componentes/footer.js"></script><script>document.addEventListener("DOMContentLoaded",async()=>{const users=await SmartCampusAPI.parseJson(await SmartCampusAPI.listarUsuarios());document.querySelector("#usuarios-body").innerHTML=users.map(u=>`<tr><td>${u.nombre}</td><td>${u.email}</td><td>${u.rol_nombre}</td><td><button class="btn btn-sm btn-outline-primary">Editar</button> <button class="btn btn-sm btn-outline-danger">Eliminar</button></td></tr>`).join("")});</script></body></html>
