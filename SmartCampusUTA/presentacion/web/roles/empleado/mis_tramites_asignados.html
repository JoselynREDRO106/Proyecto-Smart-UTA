<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis tramites asignados - Empleado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/empleado.css">
</head>
<body class="empleado-accent">
  <div class="app-shell">
    <div data-navbar></div>
    <main class="container py-4">
      <div class="page-header">
        <h1>Mis tramites asignados</h1>
        <p class="text-muted">Cambio de estado y revision de detalles.</p>
      </div>
      <section class="table-wrap">
        <table class="table">
          <thead><tr><th>Tramite</th><th>Prioridad</th><th>Estado</th><th>Accion</th></tr></thead>
          <tbody data-tramites></tbody>
        </table>
      </section>
    </main>
    <div data-footer></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script type="module" src="../../assets/js/api.js"></script>
  <script type="module" src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/componentes/navbar.js"></script>
  <script src="../../assets/js/componentes/footer.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const target = document.querySelector("[data-tramites]");
      try {
        const rows = await SmartCampusAPI.parseJson(await SmartCampusAPI.obtenerHistorialTramites());
        target.innerHTML = rows.length ? rows.map((t) => `
          <tr>
            <td>${t.codigoUnico || `Tramite ${t.id}`}</td>
            <td>${t.prioridad || "media"}</td>
            <td>${SmartCampusUtils.stateBadge(t.estado || "pendiente")}</td>
            <td><a href="../../tramites/detalle_tramite.html?id=${t.id}" class="btn btn-sm btn-outline-primary">Detalle</a></td>
          </tr>
        `).join("") : `<tr><td colspan="4" class="text-muted">No hay tramites asignados.</td></tr>`;
      } catch (error) {
        target.innerHTML = `<tr><td colspan="4" class="text-danger">${error.message}</td></tr>`;
      }
    });
  </script>
</body>
</html>
