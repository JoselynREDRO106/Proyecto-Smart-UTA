<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis turnos - Estudiante</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/estudiante.css">
</head>
<body class="estudiante-accent">
  <div class="app-shell">
    <div data-navbar></div>
    <main class="container py-4">
      <div class="page-header">
        <h1>Mis turnos</h1>
        <p class="text-muted">Turnos del usuario actual y estado en la cola FIFO.</p>
      </div>
      <section class="content-panel">
        <div data-cola></div>
        <form class="row g-2 mt-3" id="cancel-form">
          <div class="col-md-8"><input class="form-control" name="turnoId" type="number" min="1" placeholder="ID de turno a cancelar" required></div>
          <div class="col-md-4"><button class="btn btn-outline-danger w-100">Cancelar turno</button></div>
        </form>
        <div id="turnos-alert" class="mt-3"></div>
      </section>
    </main>
    <div data-footer></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script type="module" src="../../assets/js/api.js"></script>
  <script type="module" src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/componentes/navbar.js"></script>
  <script src="../../assets/js/componentes/footer.js"></script>
  <script src="../../assets/js/estructuras/cola.js"></script>
  <script>
    async function cargarTurnos() {
      const target = document.querySelector("[data-cola]");
      target.innerHTML = SmartCampusUtils.loading("Cargando turnos...");
      try {
        const turnos = await SmartCampusAPI.parseJson(await SmartCampusAPI.obtenerTurnosUsuario());
        SmartCampusCola.render(target, Array.isArray(turnos) ? turnos : [turnos].filter(Boolean));
      } catch (error) {
        SmartCampusUtils.showAlert(target, error.message, "danger");
      }
    }

    document.addEventListener("DOMContentLoaded", cargarTurnos);
    document.querySelector("#cancel-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        await SmartCampusAPI.parseJson(await SmartCampusAPI.cancelarTurno(new FormData(event.target).get("turnoId")));
        SmartCampusUtils.showAlert("#turnos-alert", "Turno cancelado.", "success");
        cargarTurnos();
      } catch (error) {
        SmartCampusUtils.showAlert("#turnos-alert", error.message, "danger");
      }
    });
  </script>
</body>
</html>
