<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis turnos - Estudiante</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/estudiante.css">
</head>
<body class="estudiante-accent">
  <div class="app-shell">
    <div data-navbar></div>
    <main class="container py-4">
      <div class="page-header">
        <h1>Mis turnos</h1>
        <p class="text-muted">Solicita un tramite para generar un turno en la cola FIFO.</p>
      </div>
      <section class="content-panel">
        <div data-cola></div>
        <a class="btn btn-primary mt-3" href="solicitar_tramite.html">Solicitar tramite y turno</a>
        <div id="turnos-alert" class="mt-3"></div>
      </section>
    </main>
    <div data-footer></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script type="module" src="../../assets/js/api.js"></script>
  <script type="module" src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/componentes/navbar.js"></script>
  <script src="../../assets/js/componentes/footer.js"></script>
  <script src="../../assets/js/estructuras/cola.js"></script>
  <script>
    async function cargarTurnos() {
      const target = document.querySelector("[data-cola]");
      target.innerHTML = `<p class="text-muted mb-0">El backend actual no expone un endpoint para listar los turnos del usuario. El turno se crea al enviar un tramite y se atiende desde la cola FIFO.</p>`;
    }

    document.addEventListener("DOMContentLoaded", cargarTurnos);
  </script>
</body>
</html>
