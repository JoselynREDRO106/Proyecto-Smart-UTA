<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Mapa campus - Estudiante</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="../../assets/css/styles.css"><link rel="stylesheet" href="../../assets/css/estudiante.css"></head><body class="estudiante-accent"><div class="app-shell"><div data-navbar></div><main class="container py-4"><div class="page-header"><h1>Mapa del campus FISEI</h1><p class="text-muted">Calcula ruta mas corta con grafo y Dijkstra desde backend.</p></div><section class="content-panel"><div class="row g-3 mb-3"><div class="col-md-5"><select class="form-select" id="origen"><option value="1">Entrada FISEI</option><option value="2">Secretaria</option></select></div><div class="col-md-5"><select class="form-select" id="destino"><option value="3">Laboratorios</option><option value="4">Aulas</option></select></div><div class="col-md-2"><button class="btn btn-primary w-100" id="ruta">Calcular</button></div></div><canvas class="graph-canvas" data-graph></canvas><p class="mt-3 text-muted" id="distancia"></p></section></main><div data-footer></div></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="../../assets/js/config.js"></script><script src="../../assets/js/utils.js"></script><script src="../../assets/js/api.js"></script><script src="../../assets/js/auth.js"></script><script src="../../assets/js/componentes/navbar.js"></script><script src="../../assets/js/componentes/footer.js"></script><script src="../../assets/js/estructuras/grafo.js"></script><script>document.addEventListener("DOMContentLoaded",()=>SmartCampusGrafo.render("[data-graph]"));document.querySelector("#ruta").addEventListener("click",async()=>{const r=await SmartCampusAPI.parseJson(await SmartCampusAPI.calcularRuta(origen.value,destino.value));document.querySelector("#distancia").textContent=`Distancia estimada: ${r.distanciaMetros} metros`;SmartCampusGrafo.render("[data-graph]",r.camino)});</script></body></html>
