<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Historial de tramites - Estudiante</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="../../assets/css/styles.css"><link rel="stylesheet" href="../../assets/css/estudiante.css"></head><body class="estudiante-accent"><div class="app-shell"><div data-navbar></div><main class="container py-4"><div class="page-header"><h1>Historial de tramites</h1></div><section class="table-wrap"><table class="table"><thead><tr><th>Fecha</th><th>Tipo</th><th>Estado</th><th></th></tr></thead><tbody data-tramites></tbody></table></section></main><div data-footer></div></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="../../assets/js/config.js"></script><script src="../../assets/js/utils.js"></script><script type="module" src="../../assets/js/api.js"></script><script type="module" src="../../assets/js/auth.js"></script><script src="../../assets/js/componentes/navbar.js"></script><script src="../../assets/js/componentes/footer.js"></script><script>document.addEventListener("DOMContentLoaded",async()=>{const data=await SmartCampusAPI.parseJson(await SmartCampusAPI.obtenerHistorialTramites());document.querySelector("[data-tramites]").innerHTML=data.map(t=>`<tr><td>${t.fecha}</td><td>${t.tipo}</td><td>${SmartCampusUtils.stateBadge(t.estado)}</td><td><a href="../../tramites/detalle_tramite.html?id=${t.id}">Ver detalle</a></td></tr>`).join("")});</script></body></html>
